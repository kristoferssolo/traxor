name: Publish
on:
  # Trigger this workflow when a tag is pushed in the format `v1.2.3`.
  push:
    tags:
      # Pattern syntax: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet
      - "v[0-9]+.[0-9]+.[0-9]+*"
  # Trigger this workflow manually via workflow dispatch.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number in the format `v1.2.3`'
        required: true
        type: string
permissions:
  contents: write
env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
jobs:
  github_release_assets:
    name: Build release assets (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: .tar.gz
            binary_ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: .tar.gz
            binary_ext: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package release archive (unix)
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/traxor${{ matrix.binary_ext }}" traxor${{ matrix.binary_ext }}
          tar -czf "dist/traxor-${RELEASE_TAG}-${{ matrix.target }}${{ matrix.archive_ext }}" \
            traxor${{ matrix.binary_ext }} \
            README.md \
            LICENSE-MIT \
            LICENSE-APACHE
  crates_io_publish:
    name: Publish (crates.io)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-release Cache
        id: cargo_release_cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-release
          key: ${{ runner.os }}-cargo-release
      - run: cargo install cargo-release
        if: steps.cargo_release_cache.outputs.cache-hit != 'true'
      - name: cargo login
        run: cargo login ${{ secrets.CRATES_IO_API_TOKEN }}
      - name: "cargo release publish"
        run: |
          cargo release \
              publish \
              --workspace \
              --all-features \
              --allow-branch HEAD \
              --no-confirm \
              --no-verify \
              --execute
  github_release:
    name: Publish (GitHub Release)
    needs: github_release_assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist
      - name: Publish GitHub release
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --generate-notes --title "$RELEASE_TAG"
          fi
